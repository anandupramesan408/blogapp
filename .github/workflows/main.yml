name: Buidl docker image and push to hub

on:
  push: 
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: chekout the repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUBUSER }}
          password: ${{ secrets.DOCKERHUTOKEN }}

      - name: set tag 
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

        ##################
        #-backend build---#
        ##################
      - name: build backend
        run: |
          docker build -t ${{ secrets.DOCKERHUBUSER }}/blogapp_backend:${TAG} ./backend

      - name: List images
        run: docker images


      - name: Scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUBUSER }}/blogapp_backend:${{ env.TAG }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          vuln-type: os
      - name: Push backend
        run: |
          docker push ${{ secrets.DOCKERHUBUSER }}/blogapp_backend:${TAG}

        ##################
        #-frontend build---#
        ##################


      - name: build frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUBUSER }}/blogapp_frontend:${TAG} ./frontend

      - name: List images
        run: docker images


      - name: Scan backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUBUSER }}/blogapp_frontend:${{ env.TAG }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          vuln-type: os
      - name: Push frontend
        run: |
          docker push ${{ secrets.DOCKERHUBUSER }}/blogapp_frontend:${TAG}
      - name: Update deployment image
        run: |
          sed -i "s|image: .*blogapp_backend:.*|image: ${{ secrets.DOCKERHUBUSER }}/blogapp_backend:${TAG}|g" kubernetes/backend-deployment.yaml
