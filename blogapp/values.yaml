backend:
  image: anandu408/mernapp-backend:latest
  replicas: 2
  port: 5000
  env:
    MONGODB_URI: "mongodb://mongo-service:27017/wanderlust"

frontend:
  image: anandu408/mernapp-frontend:latest
  replicas: 2
  port: 80
  env:
    VITE_API_PATH: ""
mongo:
  image: mongo:4.4
  replicas: 1
  port: 27017