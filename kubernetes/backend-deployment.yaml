kind: Deployment
apiVersion: apps/v1
metadata: 
  name: backend
  annotations: 
    kubernetes.io/change-cause: "backend updated to 1a3acf8"
  labels:
    app: app-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: anandu408/blogapp_backend:1a3acf8
          env:
            - name: MONGODB_URI
              value: mongodb://mongo-service:27017/wanderlust
          ports:
            - containerPort: 5000