apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: app-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: anandu408/blogapp_frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80