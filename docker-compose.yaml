services:
  mongodb:
    container_name: mongo
    image: mongo:latest
    volumes:
      - /backend/data:/data
    ports:
      - "27017:27017"

  backend:
    container_name: mernapp-backend
    build: ./backend
    image: anandu408/mernapp-backend
    env_file:
      - ./backend/.env.docker
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    container_name: mernapp-frontend
    build: ./frontend
    image: anandu408/mernapp-frontend
    env_file:
      - ./frontend/.env.docker
    ports:
      - "5173:5173"
  
  redis:
    container_name: redis
    restart: unless-stopped
    image: redis:7.0.5-alpine
    expose:
      - 6379
    depends_on:
      - mongodb
volumes:
  data: